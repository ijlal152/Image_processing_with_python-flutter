name: image_enhancement_app
description: A Flutter app for image enhancement with ML backend
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # Image handling
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # HTTP requests
  http: ^1.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # State management
  provider: ^6.1.1

  # Loading indicators
  flutter_spinkit: ^5.2.0

  # Permissions
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
